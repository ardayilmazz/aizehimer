<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Zheimer - Ayarlar</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/css/style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <span>AI</span>
                    </div>
                    <h1 class="logo-text">AI-Zheimer</h1>
                </div>
                <div class="header-right">
                    <a href="dashboard.html" class="back-to-dashboard-btn">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        <span>Dashboard'a Dön</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <div class="settings-container">
            <h2 class="settings-title">Ayarlar</h2>
            
            <!-- Settings Sections -->
            <div class="settings-section">
                <h3 class="settings-section-title">Görünüm</h3>
                <div class="settings-item">
                    <div class="settings-item-content">
                        <div class="settings-item-info">
                            <h4 class="settings-item-title">Koyu Mod</h4>
                            <p class="settings-item-description">Arayüzü koyu temaya geçir</p>
                        </div>
                        <button id="themeToggle" class="theme-toggle-switch">
                            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                © 2025 AI-Zheimer - Akıllı Hatırlatıcı Asistan | Staj Projesi
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="src/js/app.js"></script>
</body>
</html>
